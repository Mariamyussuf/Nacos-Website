<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        } else {
          document.documentElement.classList.remove('light');
        }
      })();
    </script>
    <link rel="icon" href="titimg.png" /> <!-- Favicon added here -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="NACOS Bells Chapter — Where Technology Meets Talent. The official community for developers, designers, data analysts, AI enthusiasts, and creative technologists at Bells University of Technology, Ota."
    />
    <link rel="apple-touch-icon" href="titimg.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- Fontshare: Clash Display + Satoshi -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" />
    <!-- Tabler Icons Webfont CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NACOS Bells Chapter — Where Technology Meets Talent" />
    <meta property="og:description" content="The official student representative body for computing students at Bells University of Technology. Join the community of developers, designers, and tech innovators." />
    <meta property="og:image" content="%PUBLIC_URL%/titimg.png" />
    <meta property="og:url" content="https://nacos-bells.vercel.app" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NACOS Bells Chapter — Where Technology Meets Talent" />
    <meta name="twitter:description" content="The official student representative body for computing students at Bells University of Technology." />
    <meta name="twitter:image" content="%PUBLIC_URL%/titimg.png" />
    <title>NACOS Bells Chapter — Where Technology Meets Talent</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
